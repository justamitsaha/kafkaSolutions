# Logical name of the Spring Boot application.
# Appears in logs, metrics, actuator endpoints and distributed tracing.
spring.application.name=orderServiceFunctions
# Embedded Tomcat/WebFlux server port.
server.port=8080

# Custom colored console logging pattern for local development.
logging.pattern.console=${LOGPATTERN_CONSOLE:%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %msg%n}

# ==============================================================================
# OPENAPI / SWAGGER CONFIGURATION
# ==============================================================================
# Enable OpenAPI specification generation.
springdoc.api-docs.enabled=true
# Enable Swagger UI.
springdoc.swagger-ui.enabled=true
# URL:http://localhost:8080/swagger-ui/index.html
springdoc.swagger-ui.path=/swagger-ui/index.html


# Kafka broker
spring.cloud.stream.kafka.binder.brokers=${KAFKA_BROKERS:localhost:9092,localhost:9093,localhost:9094}
spring.cloud.stream.kafka.binder.configuration.security.protocol=PLAINTEXT


# ==============================================================================
# SPRING CLOUD FUNCTION
# ==============================================================================
# Scan the application context for Function, Consumer and Supplier beans.
# Example:
# @Bean Function<Flux<OrderRequest>, Flux<Message<OrderEvent>>> ingestOrders()
# @Bean Consumer<Flux<Message<OrderEvent>>> orders()
spring.cloud.function.scan.enabled=true

# Register functions with Spring Cloud Function.
# ingestOrders
#   Input  : OrderRequest
#   Output : OrderEvent
# orders
#   Input  : OrderEvent from Kafka
#   Output : none (Consumer)
# Spring Cloud Stream uses these names to build bindings:
# ingestOrders-out-0
# orders-in-0
spring.cloud.function.definition=ingestOrders;orders

# Prevent Cloud Function HTTP endpoints from conflicting with Swagger/OpenAPI.
spring.cloud.function.web.exclude-patterns=/swagger-ui/**,/v3/api-docs/**


# ==============================================================================
# CLOUD STREAM PRODUCER BINDING
# Function: ingestOrders
# Direction: Output
# Binding Name: ingestOrders-out-0
# Naming convention: <function-name>-out-<index>
# Here:
#   ingestOrders = function bean name
#   out          = output binding
#   0            = first output
# ==============================================================================
# Flow:
# HTTP Request
#      ↓
# ingestOrders()
#      ↓
# Kafka Topic orders.v1
# ==============================================================================
# Kafka topic to which the function output is published.
spring.cloud.stream.bindings.ingestOrders-out-0.destination=orders.v1
# Serialize payloads as JSON.
spring.cloud.stream.bindings.ingestOrders-out-0.contentType=application/json
# Creates durable consumer groups metadata for the destination.
spring.cloud.stream.bindings.ingestOrders-out-0.producer.requiredGroups=order-processors

# Partition key expression.
# All events for the same customerId will go to the same Kafka partition,
# preserving ordering for a specific customer.
spring.cloud.stream.bindings.ingestOrders-out-0.producer.partitionKeyExpression=payload.customerId

# Expected number of partitions.
# Should match topic partition count.
spring.cloud.stream.bindings.ingestOrders-out-0.producer.partitionCount=3


# ==============================================================================
# CLOUD STREAM CONSUMER BINDING
# Function: orders
# Direction: Input
# Binding Name: orders-in-0
# Naming convention:
# <function-name>-in-<index>
# Here:
#   orders = consumer bean name
#   in     = input binding
#   0      = first input
# ==============================================================================
# Flow:
#
# Kafka Topic orders.v1
#          ↓
#       orders()
#          ↓
# Business Logic
# ==============================================================================
# Subscribe the consumer function to the orders.v1 topic.
spring.cloud.stream.bindings.orders-in-0.destination=orders.v1
# Kafka Consumer Group.
# All instances sharing this group cooperate and split partitions.
spring.cloud.stream.bindings.orders-in-0.group=order-processors
# Number of concurrent consumer threads.
# Since topic has 3 partitions, concurrency=3 allows parallel consumption.
spring.cloud.stream.bindings.orders-in-0.consumer.concurrency=3
# Total processing attempts before message is considered failed.
spring.cloud.stream.bindings.orders-in-0.consumer.maxAttempts=3
# Initial retry delay (milliseconds).
spring.cloud.stream.bindings.orders-in-0.consumer.backOffInitialInterval=1000
# Maximum retry delay (milliseconds).
spring.cloud.stream.bindings.orders-in-0.consumer.backOffMaxInterval=10000
# Exponential backoff multiplier.
#
# Example:
# 1s → 2s → 4s
spring.cloud.stream.bindings.orders-in-0.consumer.backOffMultiplier=2.0



# ==============================================================================
# KAFKA CONSUMER ACKNOWLEDGEMENT CONFIGURATION
# ==============================================================================
# Manual offset acknowledgement.
# Offsets are committed only when: ack.acknowledge(); is explicitly called.
spring.cloud.stream.kafka.bindings.orders-in-0.consumer.ackMode=MANUAL
# Disable Kafka auto-commit.
# Application controls offset commits.
spring.cloud.stream.kafka.bindings.orders-in-0.consumer.autoCommitOffset=false


# ==============================================================================
# DEAD LETTER TOPIC (DLT)
# ==============================================================================
# After retries are exhausted, failed records are routed to a DLT.
spring.cloud.stream.kafka.bindings.orders-in-0.consumer.enableDlq=true
# Dead Letter Topic name.
spring.cloud.stream.kafka.bindings.orders-in-0.consumer.dlqName=orders.v1.DLT



# ==============================================================================
# PRODUCER RELIABILITY SETTINGS  or Producer hardening
# ==============================================================================
# Wait for all in-sync replicas before acknowledging writes.
spring.cloud.stream.kafka.bindings.ingestOrders-out-0.producer.configuration.acks=all
# Prevent duplicate messages during retries.
spring.cloud.stream.kafka.bindings.ingestOrders-out-0.producer.configuration.enable.idempotence=true 
# Preserve ordering when retries occur.
spring.cloud.stream.kafka.bindings.ingestOrders-out-0.producer.configuration.max.in.flight.requests.per.connection=1
# Number of producer retry attempts.
spring.cloud.stream.kafka.bindings.ingestOrders-out-0.producer.configuration.retries=10


# Transactions (optional but recommended when you read-then-write)
#spring.cloud.stream.kafka.binder.transaction.transactionIdPrefix=tx-order-svc-


# Observability
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.metrics.tags.application=${spring.application.name}


