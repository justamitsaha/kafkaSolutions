# ==============================================================================
# KAFKA TOPICS DOCUMENTATION
# ==============================================================================
# When this Kafka cluster is running, the following topics need to be created:
#
# A. For orderServiceFunctions & orderServiceFunctionsSaga:
#    1. orders.v1          (Partitions: 3, Replication Factor: 3)
#    2. orders.v1.DLT      (Partitions: 3, Replication Factor: 3)
#    3. payments.v1        (Partitions: 3, Replication Factor: 3)
#
# B. For reactiveOrderService:
#    4. order.events       (Partitions: 3, Replication Factor: 3)
#    5. order.events.retry (Partitions: 3, Replication Factor: 3)
#    6. order.events.dlt   (Partitions: 3, Replication Factor: 3)
#    7. order.events.proto (Partitions: 3, Replication Factor: 3)
#
# ------------------------------------------------------------------------------
# TOPIC CREATION COMMANDS:
# ------------------------------------------------------------------------------
# You can use the helper scripts at /doc/kafka.sh or /reactiveOrderService/src/main/resources/kafka.sh,
# or execute these commands manually:
#

# ==============================================================================

version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka1:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Listeners: one for internal broker comms, one for external clients
      KAFKA_LISTENERS: INTERNAL://kafka1:19092,PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka1:19092,PLAINTEXT://${KAFKA_HOST:-localhost}:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      # Enterprise replication setup
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      # Reduce memory footprint for local machine
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx512m"

  kafka2:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka2
    depends_on:
      - zookeeper
    ports:
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://kafka2:19093,PLAINTEXT://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka2:19093,PLAINTEXT://${KAFKA_HOST:-localhost}:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx512m"

  kafka3:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka3
    depends_on:
      - zookeeper
    ports:
      - "9094:9094"
    environment:
      KAFKA_BROKER_ID: 3
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://kafka3:19094,PLAINTEXT://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka3:19094,PLAINTEXT://${KAFKA_HOST:-localhost}:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx512m"

  mysql:
    image: mysql:8.0
    container_name: mysql-non-reactive
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: shamit2020
      MYSQL_DATABASE: kafka_app
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pshamit2020"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:

