# Logical name of the Spring Boot application.
spring.application.name=orderServiceFunctions
# Embedded Tomcat/WebFlux server port.
server.port=8080

# Custom colored console logging pattern for local development.
logging.pattern.console=${LOGPATTERN_CONSOLE:%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %msg%n}



# Kafka broker
spring.cloud.stream.kafka.binder.brokers=${KAFKA_BROKERS:localhost:9092,localhost:9093,localhost:9094}
spring.cloud.stream.kafka.binder.configuration.security.protocol=PLAINTEXT
spring.cloud.stream.kafka.binder.producer-properties.key.serializer=org.apache.kafka.common.serialization.StringSerializer

# ==============================================================================
# SPRING CLOUD FUNCTION
# ==============================================================================
spring.cloud.function.scan.enabled=true
spring.cloud.function.definition=orderProcessor;paymentProcessor;orderFinalizer



# ==============================================================================
# CLOUD STREAM PRODUCER BINDING (ingestOrders)
# ==============================================================================
spring.cloud.stream.bindings.ingestOrders-out-0.destination=orders.v1
spring.cloud.stream.bindings.ingestOrders-out-0.contentType=application/json
spring.cloud.stream.bindings.ingestOrders-out-0.producer.requiredGroups=order-processors,order-finalizers
spring.cloud.stream.bindings.ingestOrders-out-0.producer.partitionKeyExpression=headers['kafka_messageKey']
spring.cloud.stream.bindings.ingestOrders-out-0.producer.partitionCount=3

# ==============================================================================
# CLOUD STREAM CONSUMER & PRODUCER BINDINGS FOR SAGA WORKFLOW
# ==============================================================================

# --- Function: orderProcessor ---
# Input: orders.v1
spring.cloud.stream.bindings.orderProcessor-in-0.destination=orders.v1
spring.cloud.stream.bindings.orderProcessor-in-0.group=order-processors
spring.cloud.stream.bindings.orderProcessor-in-0.consumer.concurrency=3
spring.cloud.stream.bindings.orderProcessor-in-0.consumer.maxAttempts=3
spring.cloud.stream.bindings.orderProcessor-in-0.consumer.backOffInitialInterval=1000
spring.cloud.stream.bindings.orderProcessor-in-0.consumer.backOffMaxInterval=10000
spring.cloud.stream.bindings.orderProcessor-in-0.consumer.backOffMultiplier=2.0

# Manual ACK settings for orderProcessor
spring.cloud.stream.kafka.bindings.orderProcessor-in-0.consumer.ackMode=MANUAL
spring.cloud.stream.kafka.bindings.orderProcessor-in-0.consumer.autoCommitOffset=false
spring.cloud.stream.kafka.bindings.orderProcessor-in-0.consumer.enableDlq=true
spring.cloud.stream.kafka.bindings.orderProcessor-in-0.consumer.dlqName=orders.v1.DLT

# Output 0 (maps to orders.v1 topic)
spring.cloud.stream.bindings.orderProcessor-out-0.destination=orders.v1
spring.cloud.stream.bindings.orderProcessor-out-0.contentType=application/json
spring.cloud.stream.bindings.orderProcessor-out-0.producer.requiredGroups=order-finalizers
spring.cloud.stream.bindings.orderProcessor-out-0.producer.partitionKeyExpression=headers['kafka_messageKey']
spring.cloud.stream.bindings.orderProcessor-out-0.producer.partitionCount=3

# Output 1 (maps to payments.v1 topic)
spring.cloud.stream.bindings.orderProcessor-out-1.destination=payments.v1
spring.cloud.stream.bindings.orderProcessor-out-1.contentType=application/json
spring.cloud.stream.bindings.orderProcessor-out-1.producer.requiredGroups=payment-processors
spring.cloud.stream.bindings.orderProcessor-out-1.producer.partitionKeyExpression=headers['kafka_messageKey']
spring.cloud.stream.bindings.orderProcessor-out-1.producer.partitionCount=3


# --- Function: paymentProcessor ---
# Input: payments.v1
spring.cloud.stream.bindings.paymentProcessor-in-0.destination=payments.v1
spring.cloud.stream.bindings.paymentProcessor-in-0.group=payment-processors
spring.cloud.stream.bindings.paymentProcessor-in-0.consumer.concurrency=3
spring.cloud.stream.bindings.paymentProcessor-in-0.consumer.maxAttempts=3
spring.cloud.stream.bindings.paymentProcessor-in-0.consumer.backOffInitialInterval=1000
spring.cloud.stream.bindings.paymentProcessor-in-0.consumer.backOffMaxInterval=10000
spring.cloud.stream.bindings.paymentProcessor-in-0.consumer.backOffMultiplier=2.0

# Manual ACK settings for paymentProcessor
spring.cloud.stream.kafka.bindings.paymentProcessor-in-0.consumer.ackMode=MANUAL
spring.cloud.stream.kafka.bindings.paymentProcessor-in-0.consumer.autoCommitOffset=false
spring.cloud.stream.kafka.bindings.paymentProcessor-in-0.consumer.enableDlq=true
spring.cloud.stream.kafka.bindings.paymentProcessor-in-0.consumer.dlqName=orders.v1.DLT

# Output: orders.v1
spring.cloud.stream.bindings.paymentProcessor-out-0.destination=orders.v1
spring.cloud.stream.bindings.paymentProcessor-out-0.contentType=application/json
spring.cloud.stream.bindings.paymentProcessor-out-0.producer.requiredGroups=order-finalizers
spring.cloud.stream.bindings.paymentProcessor-out-0.producer.partitionKeyExpression=headers['kafka_messageKey']
spring.cloud.stream.bindings.paymentProcessor-out-0.producer.partitionCount=3


# --- Function: orderFinalizer ---
# Input: orders.v1
spring.cloud.stream.bindings.orderFinalizer-in-0.destination=orders.v1
spring.cloud.stream.bindings.orderFinalizer-in-0.group=order-finalizers
spring.cloud.stream.bindings.orderFinalizer-in-0.consumer.concurrency=3
spring.cloud.stream.bindings.orderFinalizer-in-0.consumer.maxAttempts=3
spring.cloud.stream.bindings.orderFinalizer-in-0.consumer.backOffInitialInterval=1000
spring.cloud.stream.bindings.orderFinalizer-in-0.consumer.backOffMaxInterval=10000
spring.cloud.stream.bindings.orderFinalizer-in-0.consumer.backOffMultiplier=2.0

# Manual ACK settings for orderFinalizer
spring.cloud.stream.kafka.bindings.orderFinalizer-in-0.consumer.ackMode=MANUAL
spring.cloud.stream.kafka.bindings.orderFinalizer-in-0.consumer.autoCommitOffset=false
spring.cloud.stream.kafka.bindings.orderFinalizer-in-0.consumer.enableDlq=true
spring.cloud.stream.kafka.bindings.orderFinalizer-in-0.consumer.dlqName=orders.v1.DLT


# ==============================================================================
# PRODUCER RELIABILITY SETTINGS
# ==============================================================================
# ingestOrders reliability
spring.cloud.stream.kafka.bindings.ingestOrders-out-0.producer.configuration.acks=all
spring.cloud.stream.kafka.bindings.ingestOrders-out-0.producer.configuration.enable.idempotence=true 
spring.cloud.stream.kafka.bindings.ingestOrders-out-0.producer.configuration.max.in.flight.requests.per.connection=1
spring.cloud.stream.kafka.bindings.ingestOrders-out-0.producer.configuration.retries=10

# orderProcessor reliability (out-0 & out-1)
spring.cloud.stream.kafka.bindings.orderProcessor-out-0.producer.configuration.acks=all
spring.cloud.stream.kafka.bindings.orderProcessor-out-0.producer.configuration.enable.idempotence=true 
spring.cloud.stream.kafka.bindings.orderProcessor-out-0.producer.configuration.max.in.flight.requests.per.connection=1
spring.cloud.stream.kafka.bindings.orderProcessor-out-0.producer.configuration.retries=10

spring.cloud.stream.kafka.bindings.orderProcessor-out-1.producer.configuration.acks=all
spring.cloud.stream.kafka.bindings.orderProcessor-out-1.producer.configuration.enable.idempotence=true 
spring.cloud.stream.kafka.bindings.orderProcessor-out-1.producer.configuration.max.in.flight.requests.per.connection=1
spring.cloud.stream.kafka.bindings.orderProcessor-out-1.producer.configuration.retries=10

# paymentProcessor reliability
spring.cloud.stream.kafka.bindings.paymentProcessor-out-0.producer.configuration.acks=all
spring.cloud.stream.kafka.bindings.paymentProcessor-out-0.producer.configuration.enable.idempotence=true 
spring.cloud.stream.kafka.bindings.paymentProcessor-out-0.producer.configuration.max.in.flight.requests.per.connection=1
spring.cloud.stream.kafka.bindings.paymentProcessor-out-0.producer.configuration.retries=10


# Observability
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.metrics.tags.application=${spring.application.name}
