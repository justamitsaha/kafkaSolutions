# ==============================================================================
# COMMON BROKER-AGNOSTIC SETTINGS
# ==============================================================================
spring.application.name=orderServiceFunctions
server.port=8080

# Active Spring Profile (set to kafka by default; switch to rabbitmq at runtime)
spring.profiles.active=rabbitmq

# Console Logging Pattern
logging.pattern.console=${LOGPATTERN_CONSOLE:%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %msg%n}

# ==============================================================================
# SPRING CLOUD FUNCTION
# ==============================================================================
spring.cloud.function.scan.enabled=true
spring.cloud.function.definition=orders

# ==============================================================================
# OBSERVABILITY
# ==============================================================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.metrics.tags.application=${spring.application.name}
